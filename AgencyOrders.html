function getLoginKeyFromURL() {
  const hash = window.location.hash // e.g. #s=KEY123
  const m = hash.match(/[#&]s=([^&]+)/)
  return m ? m[1] : null
}
function getSession() {
  try { return JSON.parse(localStorage.getItem(SESSION_KEY)) } catch { return null }

function clearSession() { localStorage.removeItem(SESSION_KEY) }

async function apiFetch(path, opts = {}) {
  try {
    const res = await fetch(`${API_BASE}${path}`, {
      headers: { 'Content-Type': 'application/json', ...opts.headers },
      ...opts,
    })
    const data = await res.json()
    if (!res.ok) throw new Error(data.detail || data.message || `HTTP ${res.status}`)
    return { ok: true, data }
  } catch(e) {
    return { ok: false, error: e.message }
  }
}

function calcTierFee(amount, tiers) {
  if (!tiers || tiers.length === 0 || amount <= 0) return 0
  const tier = tiers.find(t => amount >= parseFloat(t.fromValue) && amount <= parseFloat(t.toValue))
  if (!tier) return 0
  return Math.round(amount * parseFloat(tier.percentFee) / 100 + parseFloat(tier.fixedFee))
}

function fmtVND(n) { return n.toLocaleString('vi-VN') }
function fmtKg(g) { return (g / 1000).toFixed(1) }

function getStatusLabel(s) {
  const m = { pending:'Đơn nháp', pickup:'Chờ bàn giao', in_transit:'Đang giao',
    returning:'Đang hoàn', redelivery:'Giao lại', delivered:'Hoàn tất',
    cancelled:'Đã huỷ', failed:'Thất bại', lost:'Thất lạc', damaged:'Hư hỏng' }
  return m[s] || s
}
function getStatusColor(s) {
  if (['delivered'].includes(s)) return { bg:'#D1FAE5', color:'#059669' }
  if (['pending'].includes(s)) return { bg:'#FEF3C7', color:'#D97706' }
  if (['in_transit','pickup'].includes(s)) return { bg:'#DBEAFE', color:'#2563EB' }
  if (['cancelled','failed','lost','damaged'].includes(s)) return { bg:'#FEE2E2', color:'#DC2626' }
  return { bg:'#F3F4F6', color:'#6B7280' }
}

  const [provincesV3, setProvincesV3] = useState([])          // địa chỉ mới (v3 province ID)
  const [districts, setDistricts]     = useState([])
  const [wards, setWards]             = useState([])
  const [loadingAddr, setLoadingAddr] = useState(false)
  const [productLines, setProductLines] = useState([{ id: Date.now(), name: '', qty: 1, price: 0, weight: 0.2, dimD: 10, dimR: 10, dimC: 10 }])
  const addProductLine = () => setProductLines(p => [...p, { id: Date.now(), name: '', qty: 1, price: 0, weight: 0.2, dimD: 10, dimR: 10, dimC: 10 }])
  const removeProductLine = (id) => setProductLines(p => p.filter(l => l.id !== id))
  const updateProductLine = (id, field, val) => setProductLines(p => p.map(l => l.id === id ? { ...l, [field]: val } : l))

  const [cod, setCod]                       = useState(0)
  const [discount, setDiscount]             = useState(0)
  const [shipCollect, setShipCollect]       = useState(0)
  const [goodsValue, setGoodsValue]         = useState(0)
  const [shopCode, setShopCode]             = useState('')
  const [declareValue, setDeclareValue]     = useState(false)
  const [partialDeliver, setPartialDeliver] = useState(false)
  const [collectOnFail, setCollectOnFail]   = useState(true)
  const [collectAmt, setCollectAmt]         = useState(0)
  const [feePayer, setFeePayer]             = useState('sender')
  const [creating, setCreating]             = useState(false)

  const selectedShop = agencyShops.find(s => s.id === shopId) ?? agencyShops[0]

  const currentServices = useMemo(() =>
    (selectedShop?.configuredServices ?? []).map(cs => ({
      ...cs, service: SERVICES.find(sv => sv.id === cs.serviceId)
    })).filter(cs => cs.service?.priceTableId)
  , [shopId])

  const [serviceId, setServiceId] = useState(currentServices[0]?.serviceId ?? '')
  const [serviceType, setServiceType]     = useState('light')  // 'light' | 'heavy'
  const [packagingMode, setPackagingMode] = useState('gop')    // 'gop' | 'tach_sl' | 'tach_dong'
  const handleShopChange = (e) => {
    setShopId(e.target.value)
    const shop = agencyShops.find(s => s.id === e.target.value)
    const first = (shop?.configuredServices ?? [])[0]?.serviceId ?? ''
    setServiceId(first)
  }

  // Load provinces cũ khi mở drawer
  useEffect(() => {
    if (!open) return
    const session = getSession()
    const sellerId = session?.sellerId || null
    if (!sellerId) return
    setProvinceId(''); setDistrictId(''); setWardCode(''); setDistricts([]); setWards([])
    apiFetch(`/api/ghn/provinces?seller_id=${sellerId}`)
      .then(r => { if (r.ok && r.data?.data) setProvinces(r.data.data.map(p => ({ id: p.ProvinceID, name: p.ProvinceName }))) })
      .catch(() => {})
  }, [open])

  // Load provinces v3 (mới) một lần khi drawer mở
  useEffect(() => {
    if (!open) return
    const session = getSession()
    const sellerId = session?.sellerId || null
    if (!sellerId) return
    setNewProvinceId(''); setNewWards([]); setNewWardIdV2('')
    apiFetch(`/api/ghn/provinces/v3?seller_id=${sellerId}`)
      .then(r => {
        if (r.ok && r.data?.data) {
          setProvincesV3(r.data.data.map(p => ({
            id: p._id,    // GHN v3: _id là province_id mới (VD: 1000033)
            name: p.name,
          })).sort((a, b) => a.name.localeCompare(b.name, 'vi')))
        }
      })
      .catch(() => {})
  }, [open])

  // Load districts when province changes
  useEffect(() => {
    if (!provinceId) return
    const session = getSession()
    const sellerId = session?.sellerId || null
    if (!sellerId) return
    setLoadingAddr(true)
    const ep = addrMode === 'new' ? '/api/ghn/districts/v3' : '/api/ghn/districts'
    apiFetch(`${ep}?seller_id=${sellerId}&province_id=${provinceId}`)
      .then(r => { if (r.ok && r.data.data) setDistricts(r.data.data.map(d => ({ id: d.DistrictID, name: d.DistrictName }))) })
      .finally(() => setLoadingAddr(false))
  }, [provinceId, addrMode])

  // Load wards when district changes (địa chỉ cũ)
  useEffect(() => {
    if (!districtId) return
    const session = getSession()
    const sellerId = session?.sellerId || null
    if (!sellerId) return
    setLoadingAddr(true)
    apiFetch(`/api/ghn/wards?seller_id=${sellerId}&district_id=${districtId}`)
      .then(r => { if (r.ok && r.data.data) setWards(r.data.data.map(w => ({ code: w.WardCode, name: w.WardName }))) })
      .finally(() => setLoadingAddr(false))
  }, [districtId])

  // Load wards theo province cho địa chỉ mới (v3 — không cần district)
  useEffect(() => {
    if (!newProvinceId || addrMode !== 'new') return
    const session = getSession()
    const sellerId = session?.sellerId || null
    if (!sellerId) return
    setLoadingAddr(true)
    setNewWardIdV2(''); setNewWards([])
    apiFetch(`/api/ghn/wards/v3/by-province?seller_id=${sellerId}&province_id=${newProvinceId}`)
      .then(r => {
        if (r.ok && r.data?.data) setNewWards(r.data.data.map(w => ({
          id: w._id,           // GHN v3: _id = ward_id_v2 thật (VD: 1003647)
          name: w.name,
          code: String(w._id), // to_ward_code = String(ward_id_v2)
          districtId: 0,       // v3 không có district, GHN tự routing
        })).sort((a, b) => a.name.localeCompare(b.name, 'vi')))
      })
      .finally(() => setLoadingAddr(false))
  }, [newProvinceId, addrMode])

  const totalWeight = useMemo(() => productLines.reduce((s, l) => s + l.qty * (l.weight || 0), 0), [productLines])
  const totalConvertedWt = useMemo(() => productLines.reduce((s, l) => s + l.qty * Math.max(l.weight || 0, ((l.dimD||0) * (l.dimR||0) * (l.dimC||0)) / 5000), 0), [productLines])
  const dimD = Math.max(...productLines.map(l => l.dimD || 0)) || 10
  const dimR = Math.max(...productLines.map(l => l.dimR || 0)) || 10
  const dimC = Math.max(...productLines.map(l => l.dimC || 0)) || 10
  const convertedWt = totalConvertedWt

  // ─ Tính số kiện cho hàng nặng ─────────────────────────────────────────────────
  const packageCount = useMemo(() => {
    if (serviceType !== 'heavy') return 1
    const active = productLines.filter(l => l.qty > 0)
    if (packagingMode === 'tach_sl') return active.reduce((s, l) => s + l.qty, 0)
    if (packagingMode === 'tach_dong') return active.length
    return 1 // gộp kiện
  }, [serviceType, packagingMode, productLines])

  const currentServicesWithFee = useMemo(() => {
    return currentServices.map(cs => {
      let fee = cs.demoFee
      if (provinceId && districtId) {
        // GHN Mock Fee Formula
        const isIntra = (provinceId == 202) // Assuming sender is in HCM (202)
        const base = isIntra ? 16500 : 28500
        const step = Math.ceil(Math.max(0, convertedWt - 0.5) / 0.5) * 2500
        fee = base + step
        // Surcharge for express service
        if (cs.serviceId === 'SVC2') fee += 12000
      }
      return { ...cs, calculatedFee: fee }
    })
  }, [currentServices, provinceId, districtId, convertedWt])

  // Auto-fetch real fee from backend when address + weight ready
  useEffect(() => {
    if (!BACKEND_ONLINE || !provinceId || !districtId || !wardCode) return
    const session = getSession()
    const sellerId = session?.sellerId || null
    if (!sellerId) return
    const svc = currentServicesWithFee[0]
    if (!svc?.serviceId) return
    apiFetch('/api/ghn/fee', {
      method: 'POST',
      body: JSON.stringify({
        seller_id: sellerId,
        service_id: typeof svc.serviceId === 'number' ? svc.serviceId : parseInt(svc.serviceId.replace(/\D/g,'')||'0'),
        from_district_id: 1442,
        to_district_id: parseInt(districtId),
        to_ward_code: wardCode,
        weight: Math.round(convertedWt * 1000),
        length: dimD, width: dimR, height: dimC,
      })
    }).then(r => {
      if (r.ok && r.data?.data?.total) {
      }
    }).catch(() => {})
  }, [provinceId, districtId, wardCode, convertedWt])

  const selectedSvcConf = currentServicesWithFee.find(cs => cs.serviceId === serviceId)
  const selectedSvc     = selectedSvcConf?.service
  const priceTable      = selectedSvc?.priceTableId ? PRICING.find(p => p.id === selectedSvc.priceTableId) : null
  const surcharges      = priceTable?.surcharges ?? {}

  const feeShipping     = selectedSvcConf?.calculatedFee ?? 0
  const feeInsurance    = declareValue && goodsValue > 0 ? calcTierFee(goodsValue, surcharges.insurance ?? []) : 0
  const feePartial      = partialDeliver ? parseInt(surcharges.partialDelivery?.value ?? '0', 10) : 0
  const feeDelivFail    = collectOnFail ? parseInt(surcharges.deliveryFailFee?.value ?? '0', 10) : 0
  const feeCod          = cod > 0 ? calcTierFee(cod, surcharges.codFee ?? []) : 0
  const totalShipping   = feeShipping + feeInsurance + feePartial + feeDelivFail + feeCod
  const totalCollect    = feePayer === 'sender' ? cod + (shipCollect > 0 ? shipCollect : 0) : cod + feeShipping

  const now = new Date()
  const createdAt = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')} - ${now.getDate().toString().padStart(2,'0')}/${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getFullYear()}`

  const handleCreate = () => {
    const session  = getSession()
    const sellerId = session?.role === 'super_admin'
      ? (agencyShops.find(s => s.id === shopId)?.sellerId || shopId)
      : session?.sellerId
    const svcTypeId = serviceType === 'heavy' ? 5 : 2

    // ─ Xây dựng mảng items (danh sách kiện / hàng hóa) ─────────────────────────
    const buildItems = () => {
      const active = productLines.filter(l => l.qty > 0)
      if (serviceType === 'light') {
        // Hàng nhẹ: Không truyền kích thước vào từng item
        return active.map(l => ({ name: l.name || 'Hàng hoá', quantity: l.qty, weight: Math.round(l.weight * 1000) || 200 }))
      }
      
      // Hàng nặng: Kích thước phải truyền vào từng item (Vị trí số 2)
      if (packagingMode === 'tach_sl') {
        const pkgs = []
        active.forEach(l => {
          for (let i = 0; i < l.qty; i++) {
            const w = Math.round(l.weight * 1000) || 200
            pkgs.push({ name: l.name || 'Hàng', quantity: 1, weight: w, length: Math.round(l.dimD)||10, width: Math.round(l.dimR)||10, height: Math.round(l.dimC)||10 })
          }
        })
        return pkgs
      }
      if (packagingMode === 'tach_dong') {
        return active.map(l => {
          const w = Math.round(l.weight * l.qty * 1000) || 200
          return { name: l.name || 'Hàng', quantity: l.qty, weight: w, length: Math.round(l.dimD)||10, width: Math.round(l.dimR)||10, height: Math.round(l.dimC)||10 }
        })
      }
      // Gộp kiện (Hàng nặng)
      const names = active.map(l => `${l.name} (x${l.qty})`).join(', ')
      return [{
         name: names || 'Đơn hàng gộp',
         quantity: 1,
         weight: Math.round(convertedWt * 1000) || 1000,
         length: Math.round(dimD)||10, width: Math.round(dimR)||10, height: Math.round(dimC)||10
      }]
    }

    const itemsList = buildItems()

    const payload = {
      seller_id: sellerId,
      from_name: sndName || undefined,
      from_phone: sndPhone || undefined,
      from_address: sndStreet || undefined,
      to_name: rcvName || 'Khách hàng',
      to_phone: rcvPhone,
      to_address: rcvStreet,
      ...(addrMode === 'old' ? {
        to_ward_code: wardCode,
        to_district_id: parseInt(districtId),
        to_province_id: parseInt(provinceId) || null,
      } : {
        // Địa chỉ hành chính mới (01/07/2025)
        // ward_id_v2 = parseInt(WardCode) theo chuẩn GHN
        is_new_to_address: true,
        to_ward_id_v2: parseInt(newWardIdV2) || undefined,
        to_address_v2: [rcvStreet, newWards.find(w=>String(w.id)===String(newWardIdV2))?.name, provinces.find(p=>p.id==newProvinceId)?.name].filter(Boolean).join(', '),
        to_province_id: parseInt(newProvinceId) || null,
        // Vẫn truyền district + old ward_code để GHN routing (một số API vẫn cần)
        to_district_id: newWards.find(w => String(w.id)===String(newWardIdV2))?.districtId || 0,
        to_ward_code: String(newWardIdV2),  // GHN cần to_ward_code = String(ward_id_v2)
      }),
      service_id: typeof serviceId === 'number' ? serviceId : 0,
      service_type_id: svcTypeId,
      payment_type_id: feePayer === 'receiver' ? 2 : 1,
      cod_amount: cod,
      insurance_value: declareValue ? goodsValue : 0,
      note: '',
      // Vị trí 1: thông số tổng
      weight: Math.round(convertedWt * 1000) || 1000,
      length: Math.round(dimD) || 10,
      width: Math.round(dimR) || 10,
      height: Math.round(dimC) || 10,
      // Vị trí 2: thông số chi tiết (cho hàng nặng)
      items: itemsList
    }

    const newOrder = {
      id: 'ORD' + Date.now(),
      shopId,
      trackingCode: 'GHN' + Math.floor(10000000 + Math.random() * 90000000),
      status: 'pending',
      weight: payload.weight,
      receiverName: rcvName || 'Khách hàng mới',
      receiverPhone: rcvPhone,
      receiverAddress: `${rcvStreet}, ${provinceId ? provinces.find(p => p.id == provinceId)?.name : ''}`,
      cod, shippingFee: feeShipping, createdBy: 'Admin',
    }

    const hasValidAddress = addrMode === 'old'
      ? (wardCode && districtId)
      : (newWardIdV2 && newProvinceId)

    if (BACKEND_ONLINE && sellerId && hasValidAddress) {
      setCreating(true)
      // Gửi đúng 1 request với nhiều packages (items) bên trong
      apiFetch('/api/orders', { method: 'POST', body: JSON.stringify(payload) })
        .then(r => {
          if (r.ok && r.data?.order_code) {
            newOrder.trackingCode = r.data.order_code
            newOrder.status = 'pickup'
            const label = serviceType === 'heavy' ? `${itemsList.length} kiện hàng nặng` : `Sản phẩm - SL: ${itemsList.length}`
            onCreated(newOrder, label)
            onClose()
          } else {
            alert('Lỗi tạo đơn GHN: ' + (r?.error || 'Kiểm tra lại Token/ShopID hoặc dữ liệu'))
          }
        }).catch(e => alert('Lỗi kết nối Backend: ' + e.message))
        .finally(() => setCreating(false))
    } else {
      const label = serviceType === 'heavy' ? `${itemsList.length} kiện hàng nặng` : `Sản phẩm - SL: ${itemsList.length}`
      onCreated(newOrder, label)
      onClose()
    }
  }

  return (
    <>
      {/* Backdrop */}
      <div
        onClick={onClose}
        style={{
          position:'fixed', inset:0, background:'rgba(0,0,0,0.3)', zIndex:200,
          opacity: open ? 1 : 0, pointerEvents: open ? 'auto' : 'none',
          transition:'opacity 0.25s',
        }}
      />
      {/* Panel */}
      <div style={{
        position:'fixed', top:0, right:0, width:980, maxWidth:'100vw', height:'100vh',
        background:'#fff', boxShadow:'-4px 0 24px rgba(0,0,0,.18)',
        zIndex:201, display:'flex', flexDirection:'column',
        transform: open ? 'translateX(0)' : 'translateX(100%)',
        transition:'transform 0.3s cubic-bezier(0.4,0,0.2,1)',
      }}>
        {/* Header */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'13px 16px', flexShrink:0 }}>
          <span style={{ fontSize:15, fontWeight:700, color:C_TEXT_PRIMARY }}>Tạo đơn hàng</span>
          <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', padding:4, display:'flex', borderRadius:4 }}>
            <Ic.X />
          </button>
        </div>
        <div style={{ height:1, background:C_BORDER, flexShrink:0 }} />

        {/* Body */}
        <div style={{ flex:1, display:'flex', gap:6, padding:6, background:'#F3F4F6', overflow:'hidden' }}>

          {/* ── LEFT ── */}
          <div style={{ flex:1, minWidth:0, height:'100%', display:'flex', flexDirection:'column', gap:6, overflowY:'auto' }}>

            {/* Shop */}
            <div className="drawer-card">
              <CardHdr icon={<Ic.Store />} label="Shop tạo đơn" />
              <div style={{ padding:'8px 12px' }}>
                <div className="field-input" style={{ cursor:'pointer' }}>
                  <select value={shopId} onChange={handleShopChange}
                    style={{ flex:1, border:'none', outline:'none', fontSize:14, color:C_TEXT_PRIMARY, background:'transparent', cursor:'pointer', fontFamily:'Inter,sans-serif' }}>
                    {agencyShops.map(s => (
                      <option key={s.id} value={s.id}>{s.name} — {s.ownerName}</option>
                    ))}
                  </select>
                  <Ic.ChevDown />
                </div>
              </div>
            </div>

            {/* Bên gửi */}
            <div className="drawer-card">
              <CardHdr icon={<Ic.Store />} label="Bên gửi" />
              <div style={{ display:'flex', flexDirection:'column', gap:4, padding:'8px 12px' }}>
                <div style={{ display:'flex', gap:4 }}>
                  <div className="field-input" style={{ flex:1 }}>
                    <input value={sndName} onChange={e => setSndName(e.target.value)} placeholder={selectedShop?.ownerName || 'Tên người gửi'} />
                  </div>
                  <div className="field-input" style={{ flex:1 }}>
                    <input value={sndPhone} onChange={e => setSndPhone(e.target.value)} placeholder={selectedShop?.phone || 'Số điện thoại'} />
                  </div>
                </div>
                <div className="field-input">
                  <input value={sndStreet} onChange={e => setSndStreet(e.target.value)} placeholder={selectedShop?.address || 'Địa chỉ (Số nhà, tên đường...)'} />
                </div>
                <div style={{ display:'flex', alignItems:'center', gap:8, padding:'4px 0' }}>
                  <RadioDot on={true} orange />
                  <span style={{ fontSize:14, color:C_TEXT_PRIMARY }}>Lấy hàng tận nơi</span>
                </div>
                <DropField placeholder="Chọn ca lấy hàng (Tuỳ chọn)" />
              </div>
            </div>

            {/* Bên nhận */}
            <div className="drawer-card">
              <CardHdr icon={<Ic.User />} label="Bên nhận" right={
                <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                  {/* iOS toggle */}
                  <div onClick={() => { setAddrMode(m => m==='old'?'new':'old'); setNewProvinceId(''); setNewWards([]); setNewWardIdV2('') }}
                    style={{ width:40, height:22, borderRadius:11, cursor:'pointer', flexShrink:0,
                      background: addrMode==='new' ? '#FF5200' : '#D1D5DB',
                      position:'relative', transition:'background 0.2s', display:'flex', alignItems:'center', padding:'0 2px' }}>
                    <div style={{ width:18, height:18, borderRadius:'50%', background:'#fff',
                      boxShadow:'0 1px 3px rgba(0,0,0,0.25)',
                      transform: addrMode==='new' ? 'translateX(18px)' : 'translateX(0)',
                      transition:'transform 0.2s' }} />
                  </div>
                  <span style={{ fontSize:13, color: addrMode==='new'?'#FF5200':'#6B7280', fontWeight:500, whiteSpace:'nowrap' }}>
                    Địa chỉ mới
                  </span>
                  <div title="Địa chỉ theo đơn vị hành chính mới từ 01/07/2025" style={{ cursor:'help', color:'#9CA3AF', fontSize:14, lineHeight:'20px' }}>ⓘ</div>
                </div>
              } />
              <div style={{ display:'flex', flexDirection:'column', gap:8, padding:'10px 12px' }}>
                {/* Tên + SĐT — luôn hiển thị dù địa chỉ cũ hay mới */}
                <div style={{ display:'flex', gap:4 }}>
                  <div className="field-input" style={{ flex:1 }}>
                    <input value={rcvName} onChange={e => setRcvName(e.target.value)} placeholder="Tên người nhận" />
                  </div>
                  <div className="field-input" style={{ flex:1, position:'relative' }}>
                    <input value={rcvPhone} onChange={e => setRcvPhone(e.target.value)} placeholder="Số điện thoại" style={{ paddingRight:72 }} />
                    <div className="tlhh-badge" style={{ position:'absolute', right:8 }}>TLHH:0%</div>
                  </div>
                </div>

                {/* Địa chỉ nhận */}
                <div>
                  <label style={{ fontSize:13, fontWeight:500, color:C_TEXT_PRIMARY, display:'block', marginBottom:4 }}>
                    Địa chỉ nhận <span style={{ color:'#EF4444' }}>*</span>
                  </label>
                  <div className="field-input">
                    <input value={rcvStreet} onChange={e => setRcvStreet(e.target.value)} placeholder="Số nhà, tên đường" />
                  </div>
                </div>

                {addrMode === 'old' ? (
                  /* ── Địa chỉ CŨ: Tỉnh + Quận + Phường ── */
                  <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
                    <div style={{ flex:'1 1 140px' }}>
                      <label style={{ fontSize:13, fontWeight:500, color:C_TEXT_PRIMARY, display:'block', marginBottom:4 }}>Tỉnh - Thành phố <span style={{ color:'#EF4444' }}>*</span></label>
                      <div className="field-input" style={{ cursor:'pointer' }}>
                        <select value={provinceId} onChange={e => { setProvinceId(e.target.value); setDistrictId(''); setWardCode(''); setDistricts([]); setWards([]) }}
                          style={{ flex:1, border:'none', outline:'none', fontSize:13, color:provinceId?C_TEXT_PRIMARY:'#9CA3AF', background:'transparent', appearance:'none' }}>
                          <option value="">Chọn Tỉnh - Thành phố</option>
                          {provinces.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                        </select>
                        <Ic.ChevDown />
                      </div>
                    </div>
                    <div style={{ flex:'1 1 140px' }}>
                      <label style={{ fontSize:13, fontWeight:500, color:C_TEXT_PRIMARY, display:'block', marginBottom:4 }}>Quận - Huyện <span style={{ color:'#EF4444' }}>*</span></label>
                      <div className="field-input" style={{ cursor:'pointer', opacity: provinceId?1:0.5 }}>
                        <select value={districtId} onChange={e => { setDistrictId(e.target.value); setWardCode(''); setWards([]) }} disabled={!provinceId}
                          style={{ flex:1, border:'none', outline:'none', fontSize:13, color:districtId?C_TEXT_PRIMARY:'#9CA3AF', background:'transparent', appearance:'none' }}>
                          <option value="">Chọn Quận - Huyện</option>
                          {(BACKEND_ONLINE ? districts : (DISTRICTS[provinceId]||[])).map(d => <option key={d.id} value={d.id}>{d.name}</option>)}
                        </select>
                        <Ic.ChevDown />
                      </div>
                    </div>
                    <div style={{ flex:'1 0 100%' }}>
                      <label style={{ fontSize:13, fontWeight:500, color:C_TEXT_PRIMARY, display:'block', marginBottom:4 }}>Phường - Xã <span style={{ color:'#EF4444' }}>*</span></label>
                      <div className="field-input" style={{ cursor:'pointer', opacity: districtId?1:0.5 }}>
                        <select value={wardCode} onChange={e => setWardCode(e.target.value)} disabled={!districtId}
                          style={{ flex:1, border:'none', outline:'none', fontSize:13, color:wardCode?C_TEXT_PRIMARY:'#9CA3AF', background:'transparent', appearance:'none' }}>
                          <option value="">Chọn Phường - Xã {loadingAddr?'⏳':''}</option>
                          {(BACKEND_ONLINE ? wards : (WARDS[districtId]||[])).map(w => <option key={w.code} value={w.code}>{w.name}</option>)}
                        </select>
                        <Ic.ChevDown />
                      </div>
                    </div>
                  </div>
                ) : (
                  /* ── Địa chỉ MỚI: Tỉnh + Phường/Xã mới (không có Quận) ── */
                  <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
                  <div style={{ flex:'1 0 100%', background:'#FFF7ED', border:'1px solid #FED7AA', borderRadius:6, padding:'8px 12px', fontSize:12, color:'#92400E', display:'flex', gap:8 }}>
                    <span>⚠️</span>
                    <span>GHN đang cập nhật dữ liệu địa chỉ mới (ward_id_v2). Nếu bị lỗi "phường/xã không tồn tại", hãy dùng <b>Địa chỉ cũ</b> tạm thời.</span>
                  </div>
                    <div style={{ flex:'1 1 140px' }}>
                      <label style={{ fontSize:13, fontWeight:500, color:C_TEXT_PRIMARY, display:'block', marginBottom:4 }}>Tỉnh - Thành phố <span style={{ color:'#EF4444' }}>*</span></label>
                      <div className="field-input" style={{ cursor:'pointer' }}>
                        <select value={newProvinceId} onChange={e => { setNewProvinceId(e.target.value); setNewWardIdV2(''); setNewWards([]) }}
                          style={{ flex:1, border:'none', outline:'none', fontSize:13, color:newProvinceId?C_TEXT_PRIMARY:'#9CA3AF', background:'transparent', appearance:'none' }}>
                          <option value="">Chọn Tỉnh - Thành phố</option>
                          {provincesV3.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                        </select>
                        <Ic.ChevDown />
                      </div>
                    </div>
                    <div style={{ flex:'1 1 140px' }}>
                      <label style={{ fontSize:13, fontWeight:500, color:C_TEXT_PRIMARY, display:'block', marginBottom:4 }}>Phường - Xã <span style={{ color:'#EF4444' }}>*</span></label>
                      <div className="field-input" style={{ cursor:'pointer', opacity: newProvinceId?1:0.5 }}>
                        <select value={newWardIdV2} onChange={e => setNewWardIdV2(e.target.value)} disabled={!newProvinceId}
                          style={{ flex:1, border:'none', outline:'none', fontSize:13, color:newWardIdV2?C_TEXT_PRIMARY:'#9CA3AF', background:'transparent', appearance:'none' }}>
                          <option value="">Chọn Phường - Xã {loadingAddr?'⏳':''}</option>
                          {newWards.map(w => <option key={w.id||w.code} value={w.id||w.code}>{w.name}</option>)}
                        </select>
                        <Ic.ChevDown />
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>

            {/* Sản phẩm */}
            <div className="drawer-card" style={{ flex:1 }}>
              <CardHdr icon={<Ic.Cube />} label="Sản phẩm" />
              <div style={{ padding:'8px 12px' }}>
                <div style={{ border:`1px solid ${C_BORDER}`, borderRadius:6, overflow:'hidden' }}>
                  <div style={{ display:'flex', background:C_BG_HEADER }}>
                    <div style={{ flex:1, padding:'6px 8px' }}><span style={{ fontSize:13, fontWeight:600, color:C_TEXT_PRIMARY }}>Tên sản phẩm</span></div>
                    <div style={{ width:50, flexShrink:0, padding:'6px 8px', textAlign:'center' }}><span style={{ fontSize:13, fontWeight:600, color:C_TEXT_PRIMARY }}>SL</span></div>
                    <div style={{ width:100, flexShrink:0, padding:'6px 8px', textAlign:'right' }}><span style={{ fontSize:13, fontWeight:600, color:C_TEXT_PRIMARY }}>Giá bán</span></div>
                    <div style={{ width:120, flexShrink:0, padding:'6px 8px', textAlign:'right' }}><span style={{ fontSize:13, fontWeight:600, color:C_TEXT_PRIMARY }}>KL / KT (D×R×C)</span></div>
                    <div style={{ width:30, flexShrink:0 }}></div>
                  </div>
                  
                  {productLines.map((line, idx) => (
                    <div key={line.id} style={{ display:'flex', alignItems:'stretch', borderTop: idx > 0 ? `1px solid ${C_BORDER}` : 'none' }}>
                      <div style={{ flex:1, padding:6 }}>
                        <div className="field-input" style={{ height:34 }}>
                          <input value={line.name} onChange={e => updateProductLine(line.id, 'name', e.target.value)} placeholder={`Sản phẩm ${idx+1}`} />
                        </div>
                      </div>
                      <div style={{ width:50, flexShrink:0, padding:6 }}>
                        <div className="field-input" style={{ height:34, padding:'0 4px' }}>
                          <input type="number" min={1} value={line.qty} onChange={e => updateProductLine(line.id, 'qty', Math.max(1, parseInt(e.target.value)||1))} style={{ textAlign:'center', width:'100%' }} />
                        </div>
                      </div>
                      <div style={{ width:100, flexShrink:0, padding:6 }}>
                        <div className="field-input" style={{ height:34 }}>
                          <input type="number" min={0} value={line.price} onChange={e => updateProductLine(line.id, 'price', parseFloat(e.target.value)||0)} style={{ textAlign:'right', width:'100%' }} />
                        </div>
                      </div>
                      <div style={{ width:120, flexShrink:0, padding:6, display:'flex', flexDirection:'column', gap:4 }}>
                        <div className="field-input" style={{ height:26 }}>
                          <input type="number" min={0.1} step={0.1} value={line.weight} onChange={e => updateProductLine(line.id, 'weight', parseFloat(e.target.value)||0)} style={{ textAlign:'right', width:'100%', fontSize:12 }} />
                          <span style={{ fontSize:11, color:'#9CA3AF', paddingRight:4 }}>kg</span>
                        </div>
                        <div style={{ display:'flex', gap:2 }}>
                          {['dimD','dimR','dimC'].map(d => (
                             <input key={d} type="number" value={line[d]} onChange={e => updateProductLine(line.id, d, parseFloat(e.target.value)||0)} 
                               style={{ width:'33%', height:22, border:`1px solid ${C_BORDER}`, borderRadius:4, textAlign:'center', fontSize:11, outline:'none', padding:0 }} />
                          ))}
                        </div>
                      </div>
                      <div style={{ width:30, flexShrink:0, display:'flex', alignItems:'center', justifyContent:'center' }}>
                        <button onClick={() => productLines.length > 1 && removeProductLine(line.id)} disabled={productLines.length <= 1}
                          style={{ border:'none', background:'transparent', color:'#9CA3AF', cursor: productLines.length>1?'pointer':'default', fontSize:16 }}>×</button>
                      </div>
                    </div>
                  ))}
                </div>
                <button onClick={addProductLine} style={{ marginTop:8, fontSize:13, color:C_LINK, border:'none', background:'none', cursor:'pointer', fontWeight:600 }}>

                </button>
              </div>
              <div style={{ height:1, background:C_BORDER, flexShrink:0 }} />

// PAGINATION
// ─────────────────────────────────────────────
function Pagination({ page, total, pageSize, onPageChange, onPageSizeChange }) {
  const [goTo, setGoTo] = useState(String(page))
  const totalPages = Math.max(1, Math.ceil(total / pageSize))

  const pages = []
  if (totalPages <= 7) {
    for (let i = 1; i <= totalPages; i++) pages.push(i)
  } else {
    pages.push(1, 2, '...', totalPages - 1, totalPages)
  }

  return (
    <div style={{ display:'flex', alignItems:'center', gap:10, padding:'9px 16px', background:'#fff', flexShrink:0, borderTop:`1px solid ${C_BORDER}` }}>
      <span style={{ fontSize:13, color:C_TEXT_PRIMARY, flexShrink:0 }}>Hiển thị</span>
      <div style={{ display:'flex', alignItems:'center', gap:6, padding:'5px 10px', border:`1px solid ${C_BORDER}`, borderRadius:6, cursor:'pointer', flexShrink:0, minWidth:70 }}
        onClick={() => onPageSizeChange(pageSize === 50 ? 100 : 50)}>
        <span style={{ flex:1, fontSize:13, color:C_TEXT_PRIMARY }}>{pageSize}</span>
        <svg width="14" height="14" viewBox="0 0 20 20" fill="none"><path d="M5 7.5l5 5 5-5" stroke="#4B5563" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
      </div>
      <span style={{ fontSize:13, color:C_TEXT_PRIMARY }}>mỗi trang</span>
      <div style={{ flex:1 }} />
      <div style={{ display:'flex', alignItems:'center', gap:4 }}>
        <div className="page-btn" onClick={() => onPageChange(Math.max(1, page-1))}><Ic.ChevLeft /></div>
        {pages.map((p, i) =>
          p === '...' ? <span key={i} style={{ fontSize:13, color:C_TEXT_PRIMARY, padding:'0 4px' }}>...</span>
          : <div key={i} className={`page-btn ${p===page?'active-page':''}`} onClick={() => onPageChange(p)}>{p}</div>
        )}
        <div className="page-btn" onClick={() => onPageChange(Math.min(totalPages, page+1))}><Ic.ChevRight /></div>
      </div>
      <span style={{ fontSize:13, color:C_TEXT_PRIMARY, flexShrink:0 }}>Đi đến trang số</span>
      <div style={{ border:`1px solid ${C_BORDER}`, borderRadius:6, width:46, padding:'5px 8px' }}>
        <input value={goTo} onChange={e => setGoTo(e.target.value)}
          onKeyDown={e => { if (e.key==='Enter') { const n=parseInt(goTo); if(!isNaN(n)&&n>=1&&n<=totalPages) onPageChange(n) } }}
          style={{ width:'100%', border:'none', outline:'none', textAlign:'center', fontSize:13, color:C_TEXT_PRIMARY, background:'transparent', fontFamily:'Inter,sans-serif' }} />
      </div>
    </div>
  )
}

          <span style={{ color:'#fff', fontWeight:800, fontSize:12 }}>{initials}</span>
        </div>
      </div>
    </div>
  )
}

// ─────────────────────────────────────────────
// ORDER DETAIL DRAWER
// ─────────────────────────────────────────────
function OrderDetailDrawer({ order, onClose }) {
  const [data, setData] = useState(null)
  const [loading, setLoading] = useState(false)
  const [error, setError] = useState('')

  useEffect(() => {
    setData(null); setError('')
    // Chỉ gọi GHN khi có order_code thật (bắt đầu bằng chữ, không phải POS...)
    const ghnCode = order?.orderCode || order?.trackingCode
    const isRealGhnCode = ghnCode && !ghnCode.startsWith('POS') && ghnCode.length > 3
    if (order && isRealGhnCode) {
      setLoading(true)
      const session = getSession()
      const sId = session?.role === 'super_admin' ? (order.shopId || '') : session?.sellerId
      apiFetch(`/api/orders/${ghnCode}?seller_id=${sId}`)
        .then(r => {
          if (r.ok && r.data) setData(r.data)
          else setError(r.error || 'Lỗi tải chi tiết đơn')
        })
        .finally(() => setLoading(false))
    } else if (order && !isRealGhnCode) {
      setError('Đơn chưa được tạo trên GHN — kiểm tra lại thông tin địa chỉ và thử Lên đơn lại.')
    }
  }, [order])

  return (
    <>
      <div className={`drawer-overlay ${order ? 'open' : ''}`} onClick={onClose} />
      <div className={`drawer ${order ? 'open' : ''}`} style={{ width: 450, display:'flex', flexDirection:'column' }}>
        <div className="drawer-header" style={{ flexShrink:0 }}>
          <div style={{ fontSize:18, fontWeight:700 }}>Chi tiết đơn hàng</div>
          <button onClick={onClose} style={{ background:'none', border:'none', fontSize:20, cursor:'pointer' }}>×</button>
        </div>
        <div className="drawer-content" style={{ flex:1, overflowY:'auto', background:'#F3F4F6', padding:0 }}>
          {order && (
            <div style={{ padding:16, display:'flex', flexDirection:'column', gap:16 }}>
              <div className="drawer-card" style={{ padding:16 }}>
                <div style={{ display:'flex', justifyContent:'space-between', marginBottom:12 }}>
                  <span style={{ fontSize:13, color:C_TEXT_SECONDARY }}>Mã đơn GHN</span>
                  <span style={{ fontSize:14, fontWeight:700, color: order.orderCode ? C_LINK : '#9CA3AF' }}>
                    {order.orderCode || 'Chưa có (đơn lỗi)'}
                  </span>
                </div>
                <div style={{ display:'flex', justifyContent:'space-between', marginBottom: order.orderCode ? 0 : 12 }}>
                  <span style={{ fontSize:13, color:C_TEXT_SECONDARY }}>Trạng thái</span>
                  <span className="status-badge" style={{ background:getStatusColor(order.status).bg, color:getStatusColor(order.status).color }}>{getStatusLabel(order.status)}</span>
                </div>
                {!order.orderCode && (
                  <button
                    onClick={() => {
                      if (!confirm('Xoá đơn lỗi này khỏi hệ thống?')) return
                      const session = getSession()
                      const sId = session?.sellerId || ''
                      apiFetch(`/api/orders/pending/${order.id}?seller_id=${sId}`, { method: 'DELETE' })
                        .then(r => {
                          if (r.ok) { alert('Đã xoá đơn lỗi'); onClose(); window.location.reload() }
                          else alert('Lỗi: ' + (r.error || 'Không xoá được'))
                        })
                    }}
                    style={{ marginTop:8, width:'100%', padding:'6px 12px', background:'#FEE2E2', border:'1px solid #FCA5A5', borderRadius:6, cursor:'pointer', fontSize:13, color:'#DC2626', fontWeight:500 }}
                  >
                    🗑️ Xoá đơn lỗi này
                  </button>
                )}
              </div>

              <div className="drawer-card" style={{ padding:16 }}>
                <div style={{ fontSize:14, fontWeight:600, marginBottom:12, color:C_TEXT_PRIMARY }}>Hành trình giao hàng</div>
                {loading && <div style={{ fontSize:13, color:C_TEXT_SECONDARY, textAlign:'center', padding:20 }}>Đang tải dữ liệu từ GHN...</div>}
                {error && <div style={{ fontSize:13, color:'#DC2626', textAlign:'center', padding:20 }}>{error}</div>}
                
                {!loading && !error && data && (data.data?.log || data.log) && (data.data?.log || data.log).length > 0 && (
                  <div style={{ display:'flex', flexDirection:'column', gap:0 }}>
                    {[...(data.data?.log || data.log)].reverse().map((l, i, arr) => (
                      <div key={i} style={{ display:'flex', gap:12 }}>
                        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', marginTop:4 }}>
                          <div style={{ width:10, height:10, borderRadius:'50%', background: i===0?'#10B981':'#D1D5DB', flexShrink:0 }} />
                          {i < arr.length - 1 && <div style={{ width:2, flex:1, background:'#E5E7EB', margin:'4px 0', minHeight:20 }} />}
                        </div>
                        <div style={{ flex:1, paddingBottom: i < arr.length - 1 ? 16 : 0 }}>
                          <div style={{ fontSize:13, fontWeight: i===0?600:400, color: i===0?'#111827':'#4B5563' }}>{l.status}</div>
                          <div style={{ fontSize:12, color:'#9CA3AF', marginTop:2 }}>{new Date(l.updated_date).toLocaleString('vi-VN')}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {!loading && !error && !data && (
                  <div style={{ fontSize:13, color:C_TEXT_SECONDARY, textAlign:'center', padding:20 }}>
                    Đơn hàng này chưa được đồng bộ với GHN.
                  </div>
                )}
                {!loading && !error && data && (!(data.data?.log || data.log) || (data.data?.log || data.log).length === 0) && (
                  <div style={{ fontSize:13, color:C_TEXT_SECONDARY, textAlign:'center', padding:20 }}>
                    Chưa có lịch sử cập nhật hành trình.
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      </div>
    </>
  )
}

// ─────────────────────────────────────────────
// AGENCY ORDERS PAGE
// ─────────────────────────────────────────────
function AgencyOrdersPage({ session }) {
  // Filter orders by seller if role=seller
  const baseOrders = useMemo(() => {
    if (!session || session.role === 'super_admin') return ORDERS_BASE
    const sellerShop = SHOPS.find(s => s.sellerId === session.sellerId)
    return ORDERS_BASE.filter(o => o.shopId === sellerShop?.id)
  }, [session])

  const [orders, setOrders]           = useState(baseOrders)
  const [activeTab, setActiveTab]     = useState('draft')
  const [search, setSearch]           = useState('')
  const [shopFilter, setShopFilter]   = useState('all')
  const [selected, setSelected]       = useState(new Set())
  const [page, setPage]               = useState(1)
  const [pageSize, setPageSize]       = useState(50)
  const [drawerOpen, setDrawerOpen]   = useState(false)
  const [detailOrder, setDetailOrder] = useState(null)

  useEffect(() => {
    if (session) {
      const sId = session.role === 'super_admin' ? '' : session.sellerId;
      apiFetch(`/api/orders${sId ? '?seller_id='+sId : ''}`)
        .then(r => {
          if (r.ok && r.data && r.data.orders) {
            const mapped = r.data.orders.map(o => {
              let productStr = 'Hàng hoá'
              try {
                if (o.ghn_response) {
                  const ghnData = JSON.parse(o.ghn_response)
                  if (ghnData.items && ghnData.items.length > 0) {
                    productStr = ghnData.items.map(i => `${i.name} - SL: ${i.quantity}`).join(', ')
                  }
                }
              } catch(e) {}
              orderProducts[o.client_code] = [productStr]

              return {
                id: o.client_code,
                shopId: o.seller_id,
                trackingCode: o.order_code || o.client_code,
                orderCode: o.order_code || null,   // GHN order code thật (null = chưa tạo trên GHN)
                status: o.status,
                weight: o.weight,
                receiverName: o.receiver_name,
                receiverPhone: o.receiver_phone,
                receiverAddress: o.receiver_address,
                cod: o.cod_amount,
                shippingFee: o.shipping_fee,
                createdBy: 'System'
              }
            })
            setOrders(prev => {
              const prevIds = new Set(prev.map(x=>x.id))
              const newOrders = mapped.filter(x => !prevIds.has(x.id))
              return [...newOrders, ...prev]
            })
          }
        })
    }
  }, [session])

  const ordersByTab = useMemo(() => ({
    draft:        orders.filter(o => o.status === 'pending'),
    pickup:       orders.filter(o => o.status === 'pickup'),
    in_transit:   orders.filter(o => o.status === 'in_transit'),
    returning:    orders.filter(o => o.status === 'returning'),
    redelivery:   orders.filter(o => o.status === 'redelivery'),
    completed:    orders.filter(o => o.status === 'delivered'),
    cancelled:    orders.filter(o => ['cancelled','failed'].includes(o.status)),
    lost_damaged: orders.filter(o => ['lost','damaged'].includes(o.status)),
  }), [orders])

  const tabOrders   = ordersByTab[activeTab] ?? orders
  const shopFiltered = shopFilter === 'all' ? tabOrders : tabOrders.filter(o => o.shopId === shopFilter)
  const filtered    = shopFiltered.filter(o =>
    o.trackingCode.toLowerCase().includes(search.toLowerCase()) ||
    o.receiverName.toLowerCase().includes(search.toLowerCase())
  )
  const paginated   = filtered.slice((page-1)*pageSize, page*pageSize)
  const allChecked  = paginated.length > 0 && paginated.every(o => selected.has(o.id))

  const toggleAll = () => {
    const next = new Set(selected)
    if (allChecked) paginated.forEach(o => next.delete(o.id))
    else            paginated.forEach(o => next.add(o.id))
    setSelected(next)
  }
  const toggleOne = (id) => {
    const next = new Set(selected); next.has(id) ? next.delete(id) : next.add(id); setSelected(next)
  }

  const handleCreated = (newOrder, productStr) => {
    orderProducts[newOrder.id] = [productStr]
    setOrders(prev => [newOrder, ...prev])
    setActiveTab(newOrder.status === 'pickup' ? 'pickup' : 'draft')
    setPage(1)
  }

  const handleCancel = (ids) => {
    if (!confirm(`Bạn có chắc chắn huỷ ${ids.length} đơn hàng này không?`)) return
    // Try real backend
    const session = getSession()
    const sellerId = session?.sellerId
    const ghnCodes = orders.filter(o => ids.includes(o.id) && o.trackingCode).map(o => o.trackingCode)
    if (BACKEND_ONLINE && sellerId && ghnCodes.length > 0) {
      apiFetch('/api/orders/cancel', { method:'POST', body: JSON.stringify({ seller_id: sellerId, order_codes: ghnCodes }) })
        .then(r => { if (!r.ok) alert('GHN: ' + r.error) })
    }
    setOrders(prev => prev.map(o => ids.includes(o.id) ? { ...o, status: 'cancelled' } : o))
    setSelected(new Set())
  }

  const handlePrint = (ids) => {
    const session = getSession()
    const sellerId = session?.sellerId
    const ghnCodes = orders.filter(o => ids.includes(o.id) && o.trackingCode?.length > 3).map(o => o.trackingCode)
    if (BACKEND_ONLINE && sellerId && ghnCodes.length > 0) {
      apiFetch('/api/orders/print-label', { method:'POST', body: JSON.stringify({ seller_id: sellerId, order_codes: ghnCodes }) })
        .then(r => {
          if (r.ok && r.data.print_url) {
            window.open(r.data.print_url, '_blank')
          } else {
            alert(`Đang tạo file PDF in tem cho ${ids.length} đơn...`)
          }
        })
    } else {
      alert(`Đang tạo file PDF in tem cho ${ids.length} đơn hàng...`)
    }
    setSelected(new Set())
  }

  const TABS = [
    { key:'draft',        label:'Đơn nháp',                     count:ordersByTab.draft.length,        cc:'#D97706' },
    { key:'pickup',       label:'Chờ bàn giao',                 count:ordersByTab.pickup.length,       cc:'#2563EB' },
    { key:'in_transit',   label:'Đã bàn giao - Đang giao',      count:ordersByTab.in_transit.length,   cc:'#2563EB' },
    { key:'returning',    label:'Đã bàn giao - Đang hoàn hàng', count:ordersByTab.returning.length,    cc:'#D97706' },
    { key:'redelivery',   label:'Chờ xác nhận giao lại',        count:ordersByTab.redelivery.length,   cc:'#D97706' },
    { key:'completed',    label:'Hoàn tất',                     count:ordersByTab.completed.length,    cc:'#059669' },
    { key:'cancelled',    label:'Đơn huỷ',                      count:ordersByTab.cancelled.length,    cc:'#DC2626' },
    { key:'lost_damaged', label:'Hàng thất lạc - hư hỏng',     count:ordersByTab.lost_damaged.length, cc:'#DC2626' },
  ]

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%', background:'#fff', overflow:'hidden' }}>

      {/* Page Header */}
      <div style={{ display:'flex', alignItems:'center', gap:12, padding:'14px 20px', flexShrink:0 }}>
        <div style={{ flex:'1 0 0' }}>
          <h1 style={{ fontSize:22, fontWeight:700, color:C_TEXT_PRIMARY, margin:0 }}>Đơn hàng</h1>
          <p style={{ fontSize:13, color:C_TEXT_SECONDARY, margin:'3px 0 0' }}>Tất cả đơn hàng từ các shop thuộc đại lý</p>
        </div>
        <button className="btn-orange" onClick={() => setDrawerOpen(true)}>
          <Ic.Plus />
          Tạo đơn hàng
        </button>
      </div>

      {/* Tabs */}
      <div className="tab-scroll" style={{ display:'flex', alignItems:'flex-end', padding:'0 20px', borderBottom:`1px solid ${C_BORDER}`, flexShrink:0, overflowX:'auto', gap:2 }}>
        {TABS.map(tab => {
          const active = activeTab === tab.key
          return (
            <div key={tab.key} className={`tab-btn ${active ? 'active' : ''}`}
              onClick={() => { setActiveTab(tab.key); setPage(1); setSelected(new Set()) }}>
              <span>{tab.label}</span>
              <span style={{ fontSize:13, fontWeight:700, color: active ? tab.cc : '#6B7280' }}>{tab.count}</span>
            </div>
          )
        })}
      </div>

      {/* Filters */}
      <div style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 20px', flexShrink:0 }}>
        <div className="search-box">
          <Ic.Search />
          <input value={search} onChange={e => { setSearch(e.target.value); setPage(1) }}
            placeholder="Tìm theo mã đơn hoặc tên khách hàng" />
        </div>
        <select value={shopFilter} onChange={e => { setShopFilter(e.target.value); setPage(1) }}
          style={{ border:`1px solid ${C_BORDER}`, borderRadius:6, padding:'7px 12px', fontSize:13, color:C_TEXT_PRIMARY, background:'#fff', cursor:'pointer', outline:'none', minWidth:190, fontFamily:'Inter,sans-serif' }}>
          <option value="all">Tất cả shop ({agencyShops.length})</option>
          {agencyShops.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
        </select>
      </div>

      {/* Selected bar */}
      {selected.size > 0 && (
        <div style={{ display:'flex', alignItems:'center', gap:12, padding:'7px 20px', background:'#EFF6FF', borderBottom:`1px solid #BFDBFE`, flexShrink:0 }}>
          <span style={{ fontSize:13, color:C_LINK, fontWeight:600 }}>Đã chọn {selected.size} đơn</span>
          <button onClick={() => setSelected(new Set())}
            style={{ border:'none', background:'none', cursor:'pointer', fontSize:13, color:C_TEXT_SECONDARY, fontFamily:'Inter,sans-serif' }}>
            Bỏ chọn
          </button>
          <div style={{ flex:1 }} />
          <button className="btn-outline" onClick={() => handleCancel(Array.from(selected))} style={{ fontSize:13, padding:'4px 10px', color:'#DC2626', borderColor:'#FEE2E2', background:'#FEF2F2' }}>Huỷ đơn</button>
          <button className="btn-outline" onClick={() => handlePrint(Array.from(selected))} style={{ fontSize:13, padding:'4px 10px' }}>In phiếu</button>
          <button className="btn-outline" style={{ fontSize:13, padding:'4px 10px' }}>Xuất Excel</button>
        </div>
      )}

      {/* Table */}
      <div style={{ flex:'1 0 0', overflow:'hidden', padding:'0 20px' }}>
        <div style={{ height:'100%', overflowY:'auto', overflowX:'auto' }}>
          <div style={{ minWidth:1350 }}>
            <THead allChecked={allChecked} onToggleAll={toggleAll} />
            <div style={{ height:1, background:C_BORDER }} />
            {paginated.map(order => (
              <TRow key={order.id} order={order} checked={selected.has(order.id)} onToggle={() => toggleOne(order.id)}
                onCancel={() => handleCancel([order.id])} onPrint={() => handlePrint([order.id])} onClick={() => setDetailOrder(order)} />
            ))}
            {paginated.length === 0 && (
              <div style={{ padding:'60px 20px', textAlign:'center' }}>
                <div style={{ marginBottom:12 }}><Ic.Package /></div>
                <div style={{ fontSize:14, color:C_TEXT_SECONDARY }}>Không có đơn hàng nào</div>
              </div>
            )}
          </div>
        </div>
      </div>

      {/* Pagination */}
      <Pagination page={page} total={filtered.length} pageSize={pageSize}
        onPageChange={setPage} onPageSizeChange={s => { setPageSize(s); setPage(1) }} />

      <CreateOrderDrawer open={drawerOpen} onClose={() => setDrawerOpen(false)} onCreated={handleCreated} />
      <OrderDetailDrawer order={detailOrder} onClose={() => setDetailOrder(null)} />
    </div>
  )
}

// ─────────────────────────────────────────────
// GHN CONNECT PAGE (dành cho nhà bán hàng)
// ─────────────────────────────────────────────
function GhnConnectPage({ session }) {
  const [status, setStatus]       = useState(null)   // { ghn_shop_id, ghn_phone, ghn_connected }
  const [loading, setLoading]     = useState(true)
  const [shopId, setShopId]       = useState('')
  const [phone, setPhone]         = useState('')
  const [otp, setOtp]             = useState('')
  const [step, setStep]           = useState('form') // 'form' | 'otp' | 'done'
  const [sending, setSending]     = useState(false)
  const [verifying, setVerifying] = useState(false)
  const [msg, setMsg]             = useState({ text:'', type:'' }) // type: 'ok' | 'err'

  const sellerId = session?.sellerId

  // Load current connection status
  useEffect(() => {
    if (!sellerId) return
    apiFetch(`/api/ghn/connection-status?seller_id=${sellerId}`)
      .then(r => {
        if (r.ok) {
          setStatus(r.data)
          if (r.data.ghn_connected) setStep('done')
          else {
            if (r.data.ghn_shop_id) setShopId(String(r.data.ghn_shop_id))
            if (r.data.ghn_phone)   setPhone(r.data.ghn_phone)
          }
        }
      })
      .finally(() => setLoading(false))
  }, [sellerId])

  const handleSendOtp = () => {
    if (!shopId || !phone) { setMsg({ text: 'Vui lòng nhập đầy đủ GHN Shop ID và Số điện thoại.', type:'err' }); return }
    setSending(true); setMsg({ text:'', type:'' })
    apiFetch('/api/ghn/send-otp', {
      method: 'POST',
      body: JSON.stringify({ seller_id: sellerId, ghn_phone: phone, ghn_shop_id: parseInt(shopId) })
    }).then(r => {
      if (r.ok) { setStep('otp'); setMsg({ text: `✅ OTP đã gửi về ${phone}. Nhập OTP để hoàn tất kết nối.`, type:'ok' }) }
      else setMsg({ text: '❌ ' + (r.error || 'Lỗi gửi OTP'), type:'err' })
    }).finally(() => setSending(false))
  }

  const handleVerifyOtp = () => {
    if (!otp) { setMsg({ text: 'Vui lòng nhập mã OTP.', type:'err' }); return }
    setVerifying(true); setMsg({ text:'', type:'' })
    apiFetch('/api/ghn/verify-otp', {
      method: 'POST',
      body: JSON.stringify({ seller_id: sellerId, ghn_phone: phone, otp })
    }).then(r => {
      if (r.ok) {
        setStep('done')
        setStatus(prev => ({ ...prev, ghn_connected: true, ghn_shop_id: parseInt(shopId), ghn_phone: phone }))
        setMsg({ text: '🎉 Kết nối GHN Affiliate thành công! Từ giờ đơn hàng sẽ được ghi nhận affiliate.', type:'ok' })
      } else setMsg({ text: '❌ ' + (r.error || 'OTP không hợp lệ hoặc đã hết hạn'), type:'err' })
    }).finally(() => setVerifying(false))
  }

  const handleReset = () => {
    setStep('form'); setOtp(''); setMsg({ text:'', type:'' })
  }

  const C = {
    cardBorder: '#E5E7EB', green: '#10B981', greenBg: '#D1FAE5',
    orange: '#FF5200', orangeBg: '#FFF0E9',
    red: '#DC2626', redBg: '#FEE2E2',
    blue: '#2563EB', blueBg: '#EFF6FF',
  }

  if (loading) return (
    <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center' }}>
      <div style={{ fontSize:14, color:C_TEXT_SECONDARY }}>Đang tải...</div>
    </div>
  )

  return (
    <div style={{ flex:1, overflowY:'auto', padding:'32px 40px', background:'#F9FAFB' }}>
      <div style={{ maxWidth:600 }}>

        {/* Header */}
        <div style={{ marginBottom:28 }}>
          <h1 style={{ fontSize:22, fontWeight:700, color:C_TEXT_PRIMARY, margin:'0 0 6px' }}>Kết nối GHN Affiliate</h1>
          <p style={{ fontSize:13, color:C_TEXT_SECONDARY, margin:0 }}>
            Kết nối shop GHN của bạn với hệ thống POS để nhận hỗ trợ affiliate từ đại lý.
          </p>
        </div>

        {/* Status Banner */}
        <div style={{
          display:'flex', alignItems:'center', gap:12, padding:'14px 16px',
          background: status?.ghn_connected ? C.greenBg : C.orangeBg,
          border: `1px solid ${status?.ghn_connected ? C.green : C.orange}`,
          borderRadius:10, marginBottom:24
        }}>
          <div style={{ fontSize:22 }}>{status?.ghn_connected ? '✅' : '🔗'}</div>
          <div>
            <div style={{ fontSize:13, fontWeight:600, color: status?.ghn_connected ? C.green : C.orange }}>
              {status?.ghn_connected ? 'Đã kết nối thành công' : 'Chưa kết nối GHN Affiliate'}
            </div>
            <div style={{ fontSize:12, color: C_TEXT_SECONDARY, marginTop:2 }}>
              {status?.ghn_connected
                ? `Shop ID: ${status.ghn_shop_id} · SĐT: ${status.ghn_phone}`
                : 'Hoàn thành các bước bên dưới để bắt đầu nhận affiliate.'}
            </div>
          </div>
        </div>

        {/* Steps Guide */}
        <div style={{ display:'flex', gap:0, marginBottom:24 }}>

// MARKDOWN-LITE RENDERER
// ─────────────────────────────────────────────
function MdRender({ text }) {
  if (!text) return null
  // Convert markdown-lite to HTML elements
  const parts = []
  let remaining = text
  let key = 0

  const lines = remaining.split('\n')
  const rendered = lines.map((line, i) => {
    // Code block fence (handled below)
    if (line.startsWith('```')) return null

    // Headers
    if (line.startsWith('**') && line.endsWith('**') && line.length > 4)
      return <div key={i} style={{fontWeight:700, color:'#111827', marginBottom:2}}>{line.slice(2,-2)}</div>

    // Bold inline
    const boldParts = line.split(/(\*\*[^*]+\*\*)/)
    const rendered2 = boldParts.map((p, j) => {
      if (p.startsWith('**') && p.endsWith('**'))
        return <strong key={j}>{p.slice(2,-2)}</strong>
      // Inline code
      const codeParts = p.split(/(`[^`]+`)/)
      return codeParts.map((c, k) =>
        c.startsWith('`') && c.endsWith('`')
          ? <code key={k} style={{background:'#F3F4F6',padding:'1px 5px',borderRadius:3,fontFamily:'monospace',fontSize:11}}>{c.slice(1,-1)}</code>
          : c
      )
    })

    if (line.startsWith('• ') || line.startsWith('- '))
      return <div key={i} style={{paddingLeft:8, marginBottom:1}}>· {rendered2.slice(1)}</div>

    return <div key={i} style={{marginBottom: line === '' ? 4 : 1}}>{rendered2}</div>
  })

  // Handle code blocks
  const codeBlockRegex = /```[\w]*\n([\s\S]*?)```/g
  const segments = text.split(codeBlockRegex)
  if (segments.length === 1) return <div style={{fontSize:13,lineHeight:1.7}}>{rendered.filter(Boolean)}</div>

  return (
    <div style={{fontSize:13,lineHeight:1.7}}>
      {segments.map((seg, i) =>
        i % 2 === 0
          ? <div key={i}>{seg.split('\n').map((l,j) => <div key={j}>{l || <br/>}</div>)}</div>
          : <pre key={i} style={{background:'#1E293B',color:'#E2E8F0',padding:'10px 12px',borderRadius:8,fontSize:12,fontFamily:'monospace',margin:'6px 0',overflowX:'auto',whiteSpace:'pre-wrap'}}>{seg}</pre>
      )}
    </div>
  )
}

function analyzeOffline(text) {
  const t = text.toLowerCase()
  let best = null, bestScore = 0
  for (const kb of OFFLINE_KB) {
    const pattern = kb.error_msg.toLowerCase()
    let score = 0
    if (t.includes(pattern)) score = pattern.length
    else if (pattern.includes(t)) score = t.length / 2
    else {
      const pTok = new Set(pattern.split(/[\s'".,]+/).filter(Boolean))
      const tTok = new Set(t.split(/[\s'".,]+/).filter(Boolean))
      const common = [...pTok].filter(x => tTok.has(x) && !['for','the','a','is','in','of','to','not','field'].includes(x))
      score = common.length * 3
    }
    if (score > bestScore) { bestScore = score; best = kb }
  }
  if (best && bestScore >= 3) {
    return { found:true, confidence:Math.min(95, bestScore*5), endpoint:best.endpoint,
      root_cause:best.root_cause, solution:best.solution,
      code_wrong:best.code_wrong, code_right:best.code_right,
      matched_pattern:best.error_msg, source:'offline_kb' }
  }
  // Heuristic
  if (t.includes('401') || t.includes('unauthorized')) return { found:true, confidence:80, endpoint:'All', root_cause:'Token không hợp lệ hoặc hết hạn', solution:'Kiểm tra header Token và ShopId', code_right:'headers={"Token":"...","ShopId":123}', source:'heuristic' }
  if (t.includes('required') || t.includes('missing') || t.includes('validation')) {
    const m = text.match(/['"](\w+)['"]/); const f = m ? m[1] : 'field'
    return { found:true, confidence:65, endpoint:'Không xác định', root_cause:`Thiếu trường bắt buộc: ${f}`, solution:`Thêm "${f}" vào request body`, code_right:`{ "${f}": <giá_trị> }`, source:'heuristic' }
  }
  return { found:false, confidence:0, root_cause:'Không tìm thấy trong knowledge base', solution:'Paste đúng error message từ response JSON của GHN' }
}

function chatOffline(msg) {
  const m = msg.toLowerCase()
  if (m.includes('token') || m.includes('auth')) return 'Header GHN:\n```\nToken: YOUR_GHN_TOKEN\nShopId: YOUR_SHOP_ID\nContent-Type: application/json\n```'
  if (m.includes('tạo đơn') || m.includes('create order')) return 'Required fields tạo đơn:\n```json\n{\n  "ToName":"Tên KH","ToPhone":"0xxx",\n  "ToAddress":"Địa chỉ",\n  "ToWardCode":"20308",\n  "ToDistrictId":1442,\n  "Weight":200,"Length":10,"Width":10,"Height":10,\n  "ServiceTypeId":2,\n  "PaymentTypeId":2,\n  "Items":[{"name":"SP","quantity":1,"weight":200}]\n}\n```'
  if (m.includes('phí') || m.includes('fee')) return 'Tính phí: GET /v2/shipping-order/fee\nParams: ServiceId, FromDistrictId, ToDistrictId, ToWardCode, Weight'
  if (m.includes('/endpoints')) return OFFLINE_KB.map(k => `• **${k.endpoint}** – \`${k.error_msg.slice(0,40)}\``).join('\n')
  if (m.includes('/kb')) return `📚 Knowledge base offline: **${OFFLINE_KB.length} lỗi đã biết**\n\n` + OFFLINE_KB.slice(0,5).map(k=>`• [${k.hit_count}x] ${k.error_msg.slice(0,50)}`).join('\n')
  if (m.includes('/help')) return '**Lệnh hỗ trợ:**\n• `/endpoints` – Danh sách endpoint\n• `/kb` – Knowledge base\n• `/help` – Trợ giúp\n\nHoặc paste error message để phân tích!'
  if (m.includes('chào') || m.includes('hello') || m.includes('hi')) return '👋 Xin chào! Tôi là **GHN API Assistant**.\n\nPaste thông báo lỗi để tôi phân tích, hoặc hỏi về API GHN bất kỳ!'

}

            </button>
            {apiResult && (
              <div className="result-box">
                {JSON.stringify(apiResult, null, 2)}
              </div>
            )}
          </div>
        )}

        {/* ── STATS TAB ── */}
        {tab === 'stats' && (
          <div style={{flex:1,overflowY:'auto'}}>
            {stats ? (
              <>
                <div className="stat-grid">
                  {[
                    {num:stats.endpoints_learned||8, lbl:'Endpoints học được'},
                    {num:stats.errors_known||OFFLINE_KB.length, lbl:'Lỗi đã biết'},
                    {num:stats.total_api_calls||0, lbl:'API calls đã test'},
                    {num:stats.failed_api_calls||0, lbl:'Calls lỗi'},
                    {num:stats.unknown_errors||0, lbl:'Lỗi chưa phân tích'},

                      <div className="stat-num">{s.num}</div>
                      <div className="stat-lbl">{s.lbl}</div>

                </div>
                <div style={{padding:'0 12px 12px'}}>
                  <button className="btn-orange" style={{width:'100%',justifyContent:'center',fontSize:13}}
                    onClick={()=>fetch(`${API_BASE}/api/ghn/learn`,{method:'POST'}).then(r=>r.json()).then(d=>alert(`✅ Đã học ${d.result?.learned} endpoints!`)).catch(()=>alert('Backend offline'))}>
                    🔄 Học lại từ GHN API
                  </button>
                </div>
              </>
            ) : (
              <div style={{padding:24,textAlign:'center'}}>
                <div style={{fontSize:32,marginBottom:8}}>📊</div>
                <div style={{fontSize:14,color:'#6B7280',marginBottom:4}}>Backend chưa kết nối</div>
                <div style={{fontSize:12,color:'#9CA3AF'}}>Chạy backend/run.bat để xem thống kê</div>
                <div style={{marginTop:16}}>
                  <div className="stat-grid">
                    {[{num:8,lbl:'Endpoints (offline)'},{num:OFFLINE_KB.length,lbl:'Lỗi đã biết (offline)'}].map((s,i)=>(
                      <div key={i} className="stat-card"><div className="stat-num">{s.num}</div><div className="stat-lbl">{s.lbl}</div></div>

              </div>
            )}
          </div>
        )}
      </div>
    </>
  )
}

function LoginPage({ onLogin }) {
  const [user, setUser]   = useState('')
  const [pass, setPass]   = useState('')
  const [err,  setErr]    = useState('')
  const [loading, setLoading] = useState(false)

  const handleLogin = async () => {
    setErr('')
    setLoading(true)

    const u = user.trim()

    if (u === ADMIN_USER && pass === ADMIN_PASS) {
      setTimeout(() => onLogin({ role:'super_admin', sellerId:null, sellerName:'Super Admin' }), 500)
      return
    }

    if (pass === '123456') {
      try {
        const r = await apiFetch('/api/sellers')
        if (r.ok && r.data && r.data.sellers) {
          const seller = r.data.sellers.find(s => (s.phone || '').trim() === u)
          if (seller && seller.status === 'active') {
            onLogin({ role:'seller', sellerId:seller.id, sellerName:seller.name })
            return
          }
        }
      } catch (e) {
        // Fallback to offline init data if API fails
      }
      
      const seller = SELLERS_INIT.find(s => (s.phone || '').trim() === u)
      if (seller && seller.status === 'active') {
        setTimeout(() => onLogin({ role:'seller', sellerId:seller.id, sellerName:seller.name }), 500)
        return
      }
    }

    setErr('Sai tên đăng nhập hoặc mật khẩu')
    setLoading(false)
  }

  return (
    <div style={{ minHeight:'100vh', background:'linear-gradient(135deg,#FF5200 0%,#FF8C00 50%,#FFB347 100%)', display:'flex', alignItems:'center', justifyContent:'center' }}>
      <div style={{ background:'#fff', borderRadius:16, padding:36, width:380, boxShadow:'0 24px 64px rgba(0,0,0,.2)' }}>
        {/* Logo */}
        <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:28 }}>
          <div style={{ width:40, height:40, background:'linear-gradient(135deg,#FF5200,#FF8C00)', borderRadius:10, display:'flex', alignItems:'center', justifyContent:'center' }}>
            <span style={{ color:'#fff', fontWeight:900, fontSize:18 }}>P</span>
          </div>
          <div>
            <div style={{ fontWeight:800, fontSize:18, color:'#111827', letterSpacing:'-0.03em' }}>POS của tao</div>
            <div style={{ fontSize:11, color:'#9CA3AF' }}>Hệ thống quản lý đơn hàng</div>
          </div>
        </div>

        <div style={{ fontSize:15, fontWeight:700, color:'#111827', marginBottom:4 }}>Đăng nhập</div>
        <div style={{ fontSize:12, color:'#9CA3AF', marginBottom:20 }}>Super Admin: admin / pos2024<br/>Nhà bán hàng: Số điện thoại / 123456</div>

        <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
          <div>
            <label style={{ fontSize:12, fontWeight:600, color:'#374151', display:'block', marginBottom:5 }}>Tên đăng nhập (SĐT)</label>
            <input value={user} onChange={e=>setUser(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&handleLogin()}
              placeholder="SĐT hoặc admin"
              style={{ width:'100%', border:`1.5px solid ${err?'#EF4444':'#E5E7EB'}`, borderRadius:8, padding:'9px 12px', fontSize:14, outline:'none', fontFamily:'Inter,sans-serif', boxSizing:'border-box', transition:'border-color .15s' }}
              onFocus={e=>e.target.style.borderColor='#FF5200'} onBlur={e=>e.target.style.borderColor=err?'#EF4444':'#E5E7EB'}
            />
          </div>
          <div>
            <label style={{ fontSize:12, fontWeight:600, color:'#374151', display:'block', marginBottom:5 }}>Mật khẩu</label>
            <input type="password" value={pass} onChange={e=>setPass(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&handleLogin()}
              placeholder="••••••••"
              style={{ width:'100%', border:`1.5px solid ${err?'#EF4444':'#E5E7EB'}`, borderRadius:8, padding:'9px 12px', fontSize:14, outline:'none', fontFamily:'Inter,sans-serif', boxSizing:'border-box', transition:'border-color .15s' }}
              onFocus={e=>e.target.style.borderColor='#FF5200'} onBlur={e=>e.target.style.borderColor=err?'#EF4444':'#E5E7EB'}
            />
          </div>
          {err && <div style={{ fontSize:12, color:'#EF4444', display:'flex', alignItems:'center', gap:4 }}>⚠️ {err}</div>}
          <button onClick={handleLogin} disabled={loading || !user || !pass}
            style={{ background: loading||!user||!pass?'#E5E7EB':'linear-gradient(135deg,#FF5200,#FF8C00)', color: loading||!user||!pass?'#9CA3AF':'#fff', border:'none', borderRadius:8, padding:'11px', fontSize:14, fontWeight:700, cursor: loading||!user||!pass?'not-allowed':'pointer', marginTop:4, fontFamily:'Inter,sans-serif', transition:'all .15s' }}>
            {loading ? '⏳ Đang đăng nhập...' : 'Đăng nhập'}
          </button>
        </div>

        <div style={{ marginTop:20, padding:12, background:'#F9FAFB', borderRadius:8, fontSize:12, color:'#6B7280' }}>
          💡 Demo: <strong>admin</strong> / <strong>pos2024</strong>
        </div>
      </div>
    </div>
  )
}
