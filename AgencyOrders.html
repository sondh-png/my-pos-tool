function SellerManagementPage() {
  const [sellers, setSellers]       = useState(SELLERS_INIT)
  const [drawerOpen, setDrawerOpen] = useState(false)
  const [copied, setCopied]         = useState(null)
  const [form, setForm]             = useState({ name:'', ownerName:'', phone:'', email:'', ghnToken:'', ghnShopId:'' })
  const [formErr, setFormErr]       = useState('')

  const pageUrl = window.location.href.split('#')[0]

  useEffect(() => {
    if (BACKEND_ONLINE) {
      apiFetch('/api/sellers').then(r => {
        if (r.ok && r.data.sellers) setSellers(r.data.sellers)
      })
    }
  }, [])

  const copyLink = (key, id) => {
    const link = `${pageUrl}#s=${key}`
    navigator.clipboard.writeText(link).then(() => {
      setCopied(id)
      setTimeout(() => setCopied(null), 2000)
    })
  }

  const generateKey = () => {
    const chars = 'ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789'
    return Array.from({length:10}, ()=>chars[Math.floor(Math.random()*chars.length)]).join('')
  }

  const handleCreate = () => {
    if (!form.name || !form.ownerName || !form.phone) { setFormErr('Vui lòng điền đầy đủ thông tin bắt buộc'); return }
    const id = 'SEL' + Date.now()
    const loginKey = generateKey()
    
    if (BACKEND_ONLINE) {
      apiFetch('/api/sellers', {
        method: 'POST',
        body: JSON.stringify({
          id, name: form.name, owner_name: form.ownerName,
          phone: form.phone, email: form.email,
          ghn_token: form.ghnToken, ghn_shop_id: parseInt(form.ghnShopId)||0,
          login_key: loginKey
        })
      }).then(r => {
        if (r.ok) {
          apiFetch('/api/sellers').then(res => { if(res.ok) setSellers(res.data.sellers) })
        }
      })
    }

    const newSeller = {
      ...form, id, ghnShopId: parseInt(form.ghnShopId)||0,
      loginKey: loginKey, status:'active',
      createdAt: new Date().toLocaleDateString('vi-VN'), shopId: null,
    }
    setSellers(p => [newSeller, ...p.filter(s=>s.id!==id)])
    setForm({ name:'', ownerName:'', phone:'', email:'', ghnToken:'', ghnShopId:'' })
    setFormErr('')
    setDrawerOpen(false)
  }

  const toggleStatus = (id) => {
    const seller = sellers.find(s => s.id === id)
    if (!seller) return
    const newStatus = seller.status === 'active' ? 'inactive' : 'active'
    if (BACKEND_ONLINE) {
      apiFetch(`/api/sellers/${id}`, {
        method: 'PUT',
        body: JSON.stringify({ status: newStatus })
      })
    }
    setSellers(p => p.map(s => s.id===id ? {...s, status:newStatus} : s))
  }

  return (
    <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
      {/* Header */}
      <div style={{ background:'#fff', borderBottom:'1px solid #E5E7EB', padding:'12px 20px', flexShrink:0, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div>
          <div style={{ fontSize:18, fontWeight:700, color:'#111827' }}>Quản lý Nhà bán hàng</div>
          <div style={{ fontSize:12, color:'#6B7280', marginTop:2 }}>{sellers.filter(s=>s.status==='active').length} đang hoạt động · {sellers.length} tổng cộng</div>
        </div>
        <button className="btn-orange" onClick={()=>setDrawerOpen(true)}>
          <Ic.Plus /> Thêm nhà bán hàng
        </button>
      </div>

      {/* Table */}
      <div style={{ flex:1, overflow:'auto', padding:20 }}>
        <div style={{ background:'#fff', borderRadius:10, border:'1px solid #E5E7EB', overflow:'hidden' }}>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 130px 180px 100px 120px', background:'#F9FAFB', borderBottom:'1px solid #E5E7EB' }}>
            {['Nhà bán hàng','Liên hệ','GHN Shop ID','Tài khoản đăng nhập','Trạng thái','Thao tác'].map(h => (
              <div key={h} style={{ padding:'10px 14px', fontSize:12, fontWeight:600, color:'#6B7280' }}>{h}</div>
            ))}
          </div>
          {sellers.map((s, i) => (
            <div key={s.id} style={{ display:'grid', gridTemplateColumns:'1fr 1fr 130px 180px 100px 120px', borderBottom: i<sellers.length-1?'1px solid #F3F4F6':'none', transition:'background .1s' }}
              onMouseEnter={e=>e.currentTarget.style.background='#FAFAFA'}
              onMouseLeave={e=>e.currentTarget.style.background='#fff'}>
              {/* Tên */}
              <div style={{ padding:'12px 14px' }}>
                <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                  <div style={{ width:32, height:32, borderRadius:8, background:'linear-gradient(135deg,#FF5200,#FF8C00)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                    <span style={{ color:'#fff', fontWeight:700, fontSize:12 }}>{s.name[0]}</span>
                  </div>
                  <div>
                    <div style={{ fontSize:13, fontWeight:600, color:'#111827' }}>{s.name}</div>
                    <div style={{ fontSize:11, color:'#9CA3AF' }}>{s.id}</div>
                  </div>
                </div>
              </div>
              {/* Liên hệ */}
              <div style={{ padding:'12px 14px', display:'flex', flexDirection:'column', justifyContent:'center' }}>
                <div style={{ fontSize:13, color:'#374151' }}>{s.ownerName}</div>
                <div style={{ fontSize:11, color:'#6B7280' }}>{s.phone} · {s.email}</div>
              </div>
              {/* GHN Shop ID */}
              <div style={{ padding:'12px 14px', display:'flex', alignItems:'center' }}>
                <span style={{ fontSize:12, background:'#F3F4F6', padding:'2px 8px', borderRadius:5, fontFamily:'monospace', color:'#374151' }}>
                  {s.ghnShopId || '—'}
                </span>
              </div>
              {/* Link */}
              <div style={{ padding:'12px 14px', display:'flex', flexDirection:'column', justifyContent:'center' }}>
                <span style={{ fontSize:13, color:'#111827', fontWeight:600 }}>{s.phone}</span>
                <span style={{ fontSize:11, color:'#6B7280' }}>Pass: 123456</span>
              </div>
              {/* Status */}
              <div style={{ padding:'12px 14px', display:'flex', alignItems:'center' }}>
                <span style={{ fontSize:11, fontWeight:600, padding:'3px 10px', borderRadius:20,
                  background: s.status==='active'?'#D1FAE5':'#FEE2E2',
                  color: s.status==='active'?'#059669':'#DC2626' }}>
                  {s.status==='active' ? '● Hoạt động' : '○ Khoá'}
                </span>
              </div>
              {/* Actions */}
              <div style={{ padding:'12px 14px', display:'flex', alignItems:'center', gap:6 }}>
                <button onClick={()=>toggleStatus(s.id)}
                  style={{ background:'#F3F4F6', border:'none', borderRadius:5, padding:'4px 10px', fontSize:11, fontWeight:600, cursor:'pointer', color:'#374151' }}>
                  {s.status==='active' ? 'Khoá' : 'Mở'}
                </button>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Create Drawer */}
      <>
        <div onClick={()=>setDrawerOpen(false)} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,.3)', zIndex:200, opacity:drawerOpen?1:0, pointerEvents:drawerOpen?'auto':'none', transition:'opacity .2s' }} />
        <div style={{ position:'fixed', top:0, right:0, width:440, height:'100vh', background:'#fff', boxShadow:'-4px 0 24px rgba(0,0,0,.15)', zIndex:201, display:'flex', flexDirection:'column', transform:drawerOpen?'translateX(0)':'translateX(100%)', transition:'transform .3s cubic-bezier(.4,0,.2,1)' }}>
          <div style={{ padding:'14px 16px', borderBottom:'1px solid #E5E7EB', display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0 }}>
            <span style={{ fontSize:15, fontWeight:700, color:'#111827' }}>Thêm Nhà Bán Hàng</span>
            <button onClick={()=>setDrawerOpen(false)} style={{ background:'none', border:'none', cursor:'pointer', padding:4 }}><Ic.X /></button>
          </div>
          <div style={{ flex:1, overflowY:'auto', padding:16, display:'flex', flexDirection:'column', gap:12 }}>
            {[
              { key:'name', label:'Tên shop *', placeholder:'Tên shop / cửa hàng' },
              { key:'ownerName', label:'Chủ shop *', placeholder:'Họ tên chủ sở hữu' },
              { key:'phone', label:'SĐT *', placeholder:'0901234567' },
              { key:'email', label:'Email', placeholder:'shop@gmail.com' },
              { key:'ghnToken', label:'GHN Token', placeholder:'Token GHN của nhà bán hàng' },
              { key:'ghnShopId', label:'GHN Shop ID', placeholder:'Nhập Shop ID từ GHN Dashboard' },
            ].map(({key,label,placeholder}) => (
              <div key={key}>
                <label style={{ fontSize:12, fontWeight:600, color:'#374151', display:'block', marginBottom:5 }}>{label}</label>
                <input value={form[key]} onChange={e=>setForm(p=>({...p,[key]:e.target.value}))}
                  placeholder={placeholder}
                  style={{ width:'100%', border:'1.5px solid #E5E7EB', borderRadius:8, padding:'9px 12px', fontSize:13, outline:'none', fontFamily:'Inter,sans-serif', boxSizing:'border-box' }}
                  onFocus={e=>e.target.style.borderColor='#FF5200'} onBlur={e=>e.target.style.borderColor='#E5E7EB'}
                />
              </div>
            ))}
            {formErr && <div style={{ fontSize:12, color:'#EF4444' }}>⚠️ {formErr}</div>}
            <div style={{ background:'#FFF0E9', borderRadius:8, padding:10, fontSize:12, color:'#92400E' }}>
              💡 Nhà bán hàng sẽ đăng nhập bằng <strong>Số điện thoại</strong> và Mật khẩu mặc định là <strong>123456</strong>.
            </div>
          </div>
          <div style={{ padding:16, borderTop:'1px solid #E5E7EB', display:'flex', gap:8, flexShrink:0 }}>
            <button className="btn-outline" style={{ flex:1, justifyContent:'center' }} onClick={()=>setDrawerOpen(false)}>Huỷ</button>
            <button className="btn-orange" style={{ flex:2, justifyContent:'center' }} onClick={handleCreate}>✓ Tạo tài khoản</button>
          </div>
        </div>
      </>
    </div>
  )
}

// ─────────────────────────────────────────────
// APP ROOT
// ─────────────────────────────────────────────
function App() {
  const [session, setSession] = useState(null)
  const [page, setPage]       = useState('orders')
  const [booting, setBooting] = useState(true)

  // On mount: check URL hash for seller link OR restore session
  useEffect(() => {
    const boot = async () => {
      const key = getLoginKeyFromURL()
      if (key) {
        let sellerList = SELLERS_INIT
        if (BACKEND_ONLINE) {
          const res = await apiFetch('/api/sellers')
          if (res.ok) sellerList = res.data.sellers
        }
        const seller = sellerList.find(s => (s.loginKey || s.login_key) === key)
        if (seller && seller.status === 'active') {
          const s = { role:'seller', sellerId:seller.id, sellerName:seller.name, loginKey:key }
          setSession(s)
          localStorage.setItem(SESSION_KEY, JSON.stringify(s))
        }
      } else {
        const saved = getSession()
        if (saved) setSession(saved)
      }
      setBooting(false)
    }
    boot()
  }, [])

  const handleLogin = (s) => {
    setSession(s)
    setPage('orders')
  }

  const handleLogout = () => {
    clearSession()
    setSession(null)
    window.location.hash = ''
    setPage('orders')
  }

  // Save session to localStorage
  useEffect(() => {
    if (session) setSession2(session)
  }, [session])

  function setSession2(s) { setSession(s); if(s) localStorage.setItem(SESSION_KEY, JSON.stringify(s)) }

  if (booting) return (
    <div style={{ height:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'#F3F4F6' }}>
      <div style={{ fontSize:14, color:'#9CA3AF' }}>Đang tải...</div>
    </div>
  )

  if (!session) return <LoginPage onLogin={(s) => { localStorage.setItem(SESSION_KEY, JSON.stringify(s)); setSession(s) }} />

  const renderPage = () => {
    if (page === 'orders')  return <AgencyOrdersPage session={session} />
    if (page === 'sellers' && session.role === 'super_admin') return <SellerManagementPage />
    if (page === 'ghn-connect' && session.role !== 'super_admin') return <GhnConnectPage session={session} />
    return <AgencyOrdersPage session={session} />
  }

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100vh', overflow:'hidden' }}>
      <TopBar session={session} />
      <div style={{ display:'flex', flex:1, overflow:'hidden' }}>
        <Sidebar activePage={page} onNavigate={setPage} session={session} onLogout={handleLogout} />
        <div style={{ flex:1, overflow:'hidden', display:'flex', flexDirection:'column' }}>
          {renderPage()}
        </div>
      </div>
      <AIAssistant />
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />)
</script>
</body>
